[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/jobs"
  to = "/.netlify/functions/jobs"
  status = 200

[[redirects]]
  from = "/api/submit"
  to = "/.netlify/functions/submit"
  status = 200

[[redirects]]
  from = "/api/ledger"
  to = "/.netlify/functions/ledger"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
